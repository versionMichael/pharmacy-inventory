services:
  postgres:
    image: postgres:18
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharmacy_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5
  fastapi:
    build:
      context: .
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: